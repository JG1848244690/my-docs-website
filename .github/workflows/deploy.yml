name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull code and deploy
        run: |
          ssh -o StrictHostKeyChecking=no -o ServerAliveInterval=60 -o ServerAliveCountMax=30 root@${{ secrets.SERVER_HOST }} "cd ${{ secrets.DEPLOY_PATH }} && git pull && pnpm install && pnpm build && (/usr/bin/pm2 delete nextra 2>/dev/null || true) && /usr/bin/pm2 start node_modules/next/dist/bin/next --name nextra -- start -p 3002 && /usr/bin/pm2 save"
