name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p 22 ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_HOST }} "mkdir -p ${{ secrets.DEPLOY_PATH }}"
          scp -o StrictHostKeyChecking=no -r .next package.json next.config.* public root@${{ secrets.SERVER_HOST }}:${{ secrets.DEPLOY_PATH }}

      - name: Install prod deps and restart
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ secrets.SERVER_HOST }} "export PATH=$PATH:/usr/bin && cd ${{ secrets.DEPLOY_PATH }} && npm install --omit=dev && (/usr/bin/pm2 delete my-docs-website 2>/dev/null || true) && /usr/bin/pm2 start npm --name 'my-docs-website' -- start -- -p 3002 && /usr/bin/pm2 save"
